# Kubernetes Service manifest
# Uses ClusterIP (internal) by default.
# Change type to 'LoadBalancer' to expose via Azure Load Balancer,
# or use an Ingress controller for HTTP/HTTPS routing.
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  labels:
    app: myapp
spec:
  type: ClusterIP
  selector:
    app: myapp
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
